name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-test-train:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run unit tests
        run: |
          python -m pytest -q

      - name: Run MLOps pipeline (train + log)
        run: |
          python mlops_pipeline.py

      - name: Upload model artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: model.joblib

      - name: Upload MLflow runs (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-runs
          path: mlruns
          if-no-files-found: ignore
